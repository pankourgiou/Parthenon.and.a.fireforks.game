<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎆 Parthenon Fireworks</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --goldlt: #f0d080;
  --panel-bg: rgba(8,6,18,0.92);
  --border: rgba(201,168,76,0.35);
  --text: #e8dcc8;
  --accent: #7ecfff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #06040f;
  font-family: 'EB Garamond', serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* ── TITLE ── */
header {
  text-align: center;
  padding: 28px 20px 16px;
  position: relative;
  z-index: 10;
}
header h1 {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(1.4rem, 4vw, 2.6rem);
  color: var(--goldlt);
  letter-spacing: 3px;
  text-shadow: 0 0 30px rgba(240,208,128,0.5);
}
header p {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  color: #a09070;
  margin-top: 4px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── CANVAS WRAPPER ── */
.scene-wrap {
  position: relative;
  width: min(860px, 96vw);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(201,168,76,0.18), 0 0 120px rgba(0,0,0,0.8);
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.scene-wrap img {
  display: block;
  width: 100%;
  pointer-events: none;
  user-select: none;
  filter: brightness(1.15) contrast(1.08) saturate(1.1);
}
#fwCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 70%;
  pointer-events: none;
  mix-blend-mode: screen;
}

/* ── CONTROL PANEL ── */
.panel {
  width: min(860px, 96vw);
  margin-top: 20px;
  margin-bottom: 30px;
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 24px 28px;
  backdrop-filter: blur(16px);
}
.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.controls-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 18px 24px;
}

.ctrl-group label {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 2px;
  color: #a09070;
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* TYPE BUTTONS */
.type-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.type-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 4px;
  color: #c8b88a;
  font-family: 'EB Garamond', serif;
  font-size: 0.88rem;
  padding: 7px 4px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.type-btn:hover { background: rgba(201,168,76,0.12); border-color: var(--gold); }
.type-btn.active {
  background: rgba(201,168,76,0.22);
  border-color: var(--goldlt);
  color: var(--goldlt);
  box-shadow: 0 0 10px rgba(201,168,76,0.3);
}

/* SLIDERS */
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 6px rgba(201,168,76,0.6);
  cursor: pointer;
}
.range-val {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  color: var(--accent);
  float: right;
  margin-top: -18px;
  pointer-events: none;
}

/* COLOR PALETTE */
.palette {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
}
.pal-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
  outline: none;
}
.pal-btn:hover { transform: scale(1.2); }
.pal-btn.active { border-color: white; transform: scale(1.25); box-shadow: 0 0 8px currentColor; }

/* TOGGLE */
.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
}
.toggle {
  position: relative;
  width: 38px; height: 20px;
  flex-shrink: 0;
}
.toggle input { opacity:0; width:0; height:0; }
.toggle-track {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.3s;
  border: 1px solid var(--border);
}
.toggle input:checked + .toggle-track { background: rgba(201,168,76,0.5); }
.toggle-track::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.3s;
}
.toggle input:checked + .toggle-track::after { transform: translateX(18px); }
.toggle-label { font-family: 'EB Garamond', serif; font-size: 0.92rem; color: var(--text); }

/* ACTION BUTTONS */
.action-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.btn {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 10px 22px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-gold {
  background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(240,208,128,0.15));
  color: var(--goldlt);
  border-color: var(--gold);
}
.btn-gold:hover { background: rgba(201,168,76,0.38); box-shadow: 0 0 16px rgba(201,168,76,0.3); }
.btn-ghost { background: transparent; color: #888; }
.btn-ghost:hover { color: var(--text); border-color: #666; }
</style>
</head>

  <h1>🎆 Parthenon Fireworks</h1>
  <p>Illuminate the sacred sky above Athens</p>
</header>

<div class="panel">
  <div class="panel-title">✦ Fireworks Customisation ✦</div>
  <div class="controls-grid">

    <!-- TYPE -->
    <div class="ctrl-group" style="grid-column: span 2;">
      <label>Firework Type</label>
      <div class="type-grid">
        <button class="type-btn active" data-type="classic"  onclick="setType(this)">🎆 Classic</button>
        <button class="type-btn"        data-type="chrysanthemum" onclick="setType(this)">🌸 Chrysanthemum</button>
        <button class="type-btn"        data-type="willow"   onclick="setType(this)">🌿 Willow</button>
        <button class="type-btn"        data-type="ring"     onclick="setType(this)">⭕ Ring</button>
        <button class="type-btn"        data-type="star"     onclick="setType(this)">⭐ Star Burst</button>
        <button class="type-btn"        data-type="crossette" onclick="setType(this)">✚ Crossette</button>
        <button class="type-btn"        data-type="comet"    onclick="setType(this)">☄️ Comet</button>
        <button class="type-btn"        data-type="peony"    onclick="setType(this)">🌺 Peony</button>
        <button class="type-btn"        data-type="spiral"   onclick="setType(this)">🌀 Spiral</button>
      </div>
    </div>

    <!-- PALETTE -->
    <div class="ctrl-group">
      <label>Colour Palette</label>
      <div class="palette">
        <button class="pal-btn active" data-pal="gold"    onclick="setPal(this)" style="background:linear-gradient(135deg,#ffd700,#ff8c00)" title="Gold"></button>
        <button class="pal-btn"        data-pal="greek"   onclick="setPal(this)" style="background:linear-gradient(135deg,#1e90ff,#ffffff)" title="Greek Blue & White"></button>
        <button class="pal-btn"        data-pal="fire"    onclick="setPal(this)" style="background:linear-gradient(135deg,#ff4500,#ff8c00,#ffd700)" title="Fire"></button>
        <button class="pal-btn"        data-pal="ice"     onclick="setPal(this)" style="background:linear-gradient(135deg,#00bfff,#e0f7ff)" title="Ice"></button>
        <button class="pal-btn"        data-pal="rainbow" onclick="setPal(this)" style="background:conic-gradient(red,orange,yellow,green,blue,violet,red)" title="Rainbow"></button>
        <button class="pal-btn"        data-pal="rose"    onclick="setPal(this)" style="background:linear-gradient(135deg,#ff69b4,#fff0f5)" title="Rose"></button>
        <button class="pal-btn"        data-pal="emerald" onclick="setPal(this)" style="background:linear-gradient(135deg,#00c853,#b9f6ca)" title="Emerald"></button>
        <button class="pal-btn"        data-pal="galaxy"  onclick="setPal(this)" style="background:linear-gradient(135deg,#6a0dad,#e040fb,#00bcd4)" title="Galaxy"></button>
      </div>
    </div>

    <!-- RATE -->
    <div class="ctrl-group">
      <label>Launch Rate</label>
      <input type="range" id="rateSlider" min="200" max="2000" value="800" step="100"
             oninput="cfg.rate=+this.value; document.getElementById('rateVal').textContent=rateLabel(+this.value)">
      <div class="range-val" id="rateVal">Medium</div>
    </div>

    <!-- SIZE -->
    <div class="ctrl-group">
      <label>Burst Size</label>
      <input type="range" id="sizeSlider" min="40" max="180" value="90" step="10"
             oninput="cfg.size=+this.value; document.getElementById('sizeVal').textContent=+this.value+'px'">
      <div class="range-val" id="sizeVal">90px</div>
    </div>

    <!-- PARTICLES -->
    <div class="ctrl-group">
      <label>Particle Count</label>
      <input type="range" id="ptSlider" min="20" max="200" value="80" step="10"
             oninput="cfg.particles=+this.value; document.getElementById('ptVal').textContent=+this.value">
      <div class="range-val" id="ptVal">80</div>
    </div>

    <!-- GRAVITY -->
    <div class="ctrl-group">
      <label>Gravity</label>
      <input type="range" id="gravSlider" min="0" max="0.5" value="0.12" step="0.01"
             oninput="cfg.gravity=+this.value; document.getElementById('gravVal').textContent=(+this.value).toFixed(2)">
      <div class="range-val" id="gravVal">0.12</div>
    </div>

    <!-- TRAIL -->
    <div class="ctrl-group">
      <label>Trail Length</label>
      <input type="range" id="trailSlider" min="0.05" max="0.4" value="0.13" step="0.01"
             oninput="cfg.fade=+this.value; document.getElementById('trailVal').textContent=trailLabel(+this.value)">
      <div class="range-val" id="trailVal">Medium</div>
    </div>

    <!-- TOGGLES -->
    <div class="ctrl-group">
      <label>Effects</label>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="glitterToggle" checked onchange="cfg.glitter=this.checked"><span class="toggle-track"></span></label>
          <span class="toggle-label">Glitter sparks</span>
        </div>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="autoToggle" checked onchange="cfg.auto=this.checked"><span class="toggle-track"></span></label>
          <span class="toggle-label">Auto-launch</span>
        </div>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="multiToggle" onchange="cfg.multi=this.checked"><span class="toggle-track"></span></label>
          <span class="toggle-label">Salvo mode (×3)</span>
        </div>
      </div>
    </div>

  </div><!-- /grid -->

  <div class="action-row">
    <button class="btn btn-gold" onclick="manualLaunch()">🎆 Launch Now</button>
    <button class="btn btn-ghost" onclick="clearAll()">✕ Clear Sky</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const cfg = {
  type: 'classic',
  pal: 'gold',
  rate: 800,
  size: 90,
  particles: 80,
  gravity: 0.12,
  fade: 0.13,
  glitter: true,
  auto: true,
  multi: false,
};

// ── PALETTES ──
const PALETTES = {
  gold:    ['#FFD700','#FFA500','#FF8C00','#FFEC8B','#FFF8DC','#FF6600'],
  greek:   ['#1E90FF','#00BFFF','#87CEEB','#FFFFFF','#4169E1','#B0C4DE'],
  fire:    ['#FF4500','#FF6347','#FF8C00','#FFD700','#FF0000','#FFA07A'],
  ice:     ['#00BFFF','#E0F7FF','#87CEEB','#B0E0E6','#AFEEEE','#FFFFFF'],
  rainbow: ['#FF0000','#FF7F00','#FFFF00','#00FF00','#0000FF','#8B00FF','#FF69B4'],
  rose:    ['#FF69B4','#FFB6C1','#FF1493','#FFC0CB','#DB7093','#FFFFFF'],
  emerald: ['#00C853','#B9F6CA','#00E676','#69F0AE','#1B5E20','#CCFF90'],
  galaxy:  ['#6A0DAD','#E040FB','#00BCD4','#FFFFFF','#7C4DFF','#CE93D8'],
};

function pickColor() {
  const p = PALETTES[cfg.pal];
  return p[Math.floor(Math.random()*p.length)];
}

// ── CANVAS SETUP ──
const canvas = document.getElementById('fwCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const wrap = document.getElementById('sceneWrap');
  W = canvas.width  = wrap.offsetWidth;
  H = canvas.height = Math.round(wrap.offsetHeight * 0.70);
}
window.addEventListener('resize', resize);
window.addEventListener('load', () => { setTimeout(resize, 100); });

// ── PARTICLES ──
let particles = [];
let rockets   = [];

// ══════════════════════════════════════════════
//  ROCKET
// ══════════════════════════════════════════════
function launchRocket(targetX, targetY) {
  const startX = W * (0.15 + Math.random() * 0.7);
  rockets.push({
    x: startX, y: H + 10,
    tx: targetX ?? W * (0.1 + Math.random() * 0.8),
    ty: targetY ?? H * (0.05 + Math.random() * 0.55),
    trail: [],
    color: pickColor(),
    speed: 8 + Math.random() * 5,
    done: false,
  });
}

function updateRockets() {
  rockets = rockets.filter(r => {
    // trail
    r.trail.push({ x: r.x, y: r.y, a: 1 });
    if (r.trail.length > 18) r.trail.shift();

    const dx = r.tx - r.x, dy = r.ty - r.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < r.speed + 2) {
      explode(r.tx, r.ty, r.color);
      return false;
    }
    r.x += (dx/dist) * r.speed;
    r.y += (dy/dist) * r.speed;
    return true;
  });
}

function drawRockets() {
  rockets.forEach(r => {
    r.trail.forEach((t, i) => {
      const a = (i / r.trail.length) * 0.8;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = r.color;
      ctx.shadowBlur = 6;
      ctx.shadowColor = r.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 2.5 - i*0.1, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  });
}

// ══════════════════════════════════════════════
//  EXPLOSIONS
// ══════════════════════════════════════════════
function explode(x, y, baseColor) {
  const type = cfg.type;
  const count = cfg.particles;
  const size  = cfg.size;

  for (let i = 0; i < count; i++) {
    const angle  = (i / count) * Math.PI * 2;
    const speed  = getSpeed(type, i, count, size);
    const color  = getColor(type, i, count, baseColor);
    const life   = getLife(type);
    const extra  = getExtra(type, i, count);

    particles.push({
      x, y,
      vx: Math.cos(angle) * speed + (extra.vx||0),
      vy: Math.sin(angle) * speed + (extra.vy||0),
      color,
      alpha: 1,
      life,
      decay: 0.012 + Math.random()*0.008,
      size: 2 + Math.random()*2,
      gravity: cfg.gravity,
      type,
      glitter: cfg.glitter && Math.random() < 0.3,
      trail: type === 'willow' || type === 'comet',
      trailPts: [],
      angle,
      i, count,
      wobble: type === 'spiral' ? (Math.random()*0.3) : 0,
      wobbleDir: Math.random() < 0.5 ? 1 : -1,
    });
  }

  // glitter centre flash
  if (cfg.glitter) {
    for (let k = 0; k < 12; k++) {
      const a = Math.random()*Math.PI*2;
      const s = 1 + Math.random()*2;
      particles.push({
        x, y,
        vx: Math.cos(a)*s, vy: Math.sin(a)*s,
        color: '#FFFFFF',
        alpha: 1, life: 0.6,
        decay: 0.04,
        size: 1.5,
        gravity: cfg.gravity * 0.3,
        glitter: false, trail: false, trailPts: [],
        wobble: 0,
      });
    }
  }
}

function getSpeed(type, i, count, size) {
  const base = size / 18;
  switch(type) {
    case 'chrysanthemum': return base * (0.6 + Math.random()*0.8);
    case 'willow':        return base * (0.3 + Math.random()*0.5);
    case 'ring':          return base * (0.9 + Math.random()*0.1);
    case 'star':          return (i % 5 === 0) ? base * 1.4 : base * 0.4;
    case 'crossette':     return base * (0.7 + Math.random()*0.4);
    case 'comet':         return base * (0.5 + Math.random()*1.2);
    case 'peony':         return base * (0.5 + Math.random()*0.7);
    case 'spiral':        return base * (0.4 + (i/count)*0.8);
    default:              return base * (0.5 + Math.random()*1);
  }
}

function getColor(type, i, count, base) {
  if (type === 'star' && i % 5 === 0) return '#FFFFFF';
  if (type === 'ring')  return base;
  if (type === 'crossette' && i % 4 === 0) return '#FFFFFF';
  const p = PALETTES[cfg.pal];
  return p[Math.floor(i / count * p.length)] || base;
}

function getLife(type) {
  switch(type) {
    case 'willow':   return 1.4 + Math.random()*0.4;
    case 'comet':    return 1.2 + Math.random()*0.5;
    case 'peony':    return 1.1 + Math.random()*0.3;
    default:         return 0.9 + Math.random()*0.3;
  }
}

function getExtra(type, i, count) {
  if (type === 'crossette' && i % 4 === 0) {
    const jitter = (Math.random()-0.5)*1.5;
    return { vx: jitter, vy: jitter };
  }
  return {};
}

// ── UPDATE & DRAW PARTICLES ──
function updateParticles() {
  particles = particles.filter(p => p.alpha > 0.01 && p.life > 0);
  particles.forEach(p => {
    if (p.trail) {
      p.trailPts.push({ x: p.x, y: p.y, a: p.alpha });
      if (p.trailPts.length > 10) p.trailPts.shift();
    }
    if (p.wobble) {
      p.vx += Math.sin(p.life * 20) * p.wobble * p.wobbleDir * 0.05;
    }
    p.x   += p.vx;
    p.y   += p.vy;
    p.vy  += p.gravity;
    p.vx  *= 0.98;
    p.vy  *= 0.98;
    p.life  -= p.decay;
    p.alpha  = Math.max(0, p.life);
    // Crossette secondary burst
    if (p.type === 'crossette' && p.life < 0.5 && !p._burst && Math.random()<0.02) {
      p._burst = true;
      for (let k=0;k<6;k++) {
        const a2=Math.random()*Math.PI*2;
        particles.push({
          x:p.x,y:p.y,
          vx:Math.cos(a2)*1.5,vy:Math.sin(a2)*1.5,
          color:'#FFFFFF',alpha:0.9,life:0.5,decay:0.04,
          size:1.5,gravity:cfg.gravity,glitter:false,trail:false,trailPts:[],wobble:0
        });
      }
    }
  });
}

function drawParticles() {
  particles.forEach(p => {
    // trail lines for willow / comet
    if (p.trail && p.trailPts.length > 1) {
      ctx.save();
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.size * 0.6;
      ctx.lineCap = 'round';
      for (let j=1;j<p.trailPts.length;j++) {
        const t0=p.trailPts[j-1], t1=p.trailPts[j];
        ctx.globalAlpha = t1.a * 0.5;
        ctx.beginPath();
        ctx.moveTo(t0.x,t0.y);
        ctx.lineTo(t1.x,t1.y);
        ctx.stroke();
      }
      ctx.restore();
    }

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle   = p.color;
    ctx.shadowBlur  = p.glitter ? 10 : 5;
    ctx.shadowColor = p.color;

    if (p.glitter && Math.random()<0.5) {
      // star shape
      ctx.beginPath();
      for (let pt=0;pt<5;pt++) {
        const a=pt*Math.PI*2/5 - Math.PI/2;
        const r=p.size*1.5, ri=r*0.4;
        if(pt===0) ctx.moveTo(p.x+Math.cos(a)*r,p.y+Math.sin(a)*r);
        else       ctx.lineTo(p.x+Math.cos(a)*r,p.y+Math.sin(a)*r);
        const ai=a+Math.PI/5;
        ctx.lineTo(p.x+Math.cos(ai)*ri,p.y+Math.sin(ai)*ri);
      }
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

// ══════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════
let lastLaunch = 0;
function loop(ts) {
  // Fade trail
  ctx.fillStyle = `rgba(0,0,0,${cfg.fade})`;
  ctx.fillRect(0, 0, W, H);

  updateRockets();
  drawRockets();
  updateParticles();
  drawParticles();

  if (cfg.auto && ts - lastLaunch > cfg.rate) {
    lastLaunch = ts;
    launchRocket();
    if (cfg.multi) { launchRocket(); launchRocket(); }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ══════════════════════════════════════════════
//  CONTROLS
// ══════════════════════════════════════════════
function setType(btn) {
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  cfg.type = btn.dataset.type;
}

function setPal(btn) {
  document.querySelectorAll('.pal-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  cfg.pal = btn.dataset.pal;
}

function manualLaunch() {
  launchRocket();
  if (cfg.multi) { launchRocket(); launchRocket(); }
}

function clearAll() {
  particles = [];
  rockets   = [];
  ctx.clearRect(0,0,W,H);
}

function rateLabel(v) {
  if (v <= 400) return 'Rapid';
  if (v <= 800) return 'Medium';
  if (v <= 1400) return 'Slow';
  return 'Very Slow';
}
function trailLabel(v) {
  if (v <= 0.1)  return 'Long';
  if (v <= 0.2)  return 'Medium';
  if (v <= 0.3)  return 'Short';
  return 'Instant';
}

// Click on scene to launch there
document.getElementById('sceneWrap').addEventListener('click', function(e) {
  const r = this.getBoundingClientRect();
  const sx = (e.clientX - r.left) / r.width  * W;
  const sy = (e.clientY - r.top)  / r.height * H;
  const targetY = Math.min(sy, H * 0.6);
  launchRocket(sx, targetY);
  if (cfg.multi) { launchRocket(sx-30, targetY-10); launchRocket(sx+30, targetY-10); }
});
</script>
</body>
</html>
